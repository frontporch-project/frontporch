services:
  asterisk:
    image: andrius/asterisk:22-cert
    network_mode: host
    volumes:
      - ${ASTERISK_ETC_DIR:?set ASTERISK_ETC_DIR}:/etc/asterisk
      - ${ASTERISK_CONF_D_DIR:?set ASTERISK_CONF_D_DIR}:/etc/asterisk/conf.d
      - ${ASTERISK_LOG_DIR:?set ASTERISK_LOG_DIR}:/var/log/asterisk
      - ${ASTERISK_SPOOL_DIR:?set ASTERISK_SPOOL_DIR}:/var/spool/asterisk
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             exec gunicorn frontporch.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-2} --threads ${GUNICORN_THREADS:-4} --timeout ${GUNICORN_TIMEOUT:-60}"
    environment:
      ASTERISK_AMI_HOST: ${ASTERISK_AMI_HOST:?set ASTERISK_AMI_HOST}
      ASTERISK_AMI_PORT: ${ASTERISK_AMI_PORT:-5038}
      ASTERISK_AMI_USERNAME: ${ASTERISK_AMI_USERNAME:?set ASTERISK_AMI_USERNAME}
      ASTERISK_AMI_PASSWORD: ${ASTERISK_AMI_PASSWORD:?set ASTERISK_AMI_PASSWORD}
      ASTERISK_AMI_TIMEOUT: ${ASTERISK_AMI_TIMEOUT:-5}
      ASTERISK_AUTO_APPLY_CONFIG: ${ASTERISK_AUTO_APPLY_CONFIG:-true}
      ASTERISK_GENERATED_CONFIG_DIR: /etc/asterisk/conf.d
      DATABASE_URL: postgres://${POSTGRES_USER:-frontporch}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-frontporch}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?set DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY}
      FRONTPORCH_DEFAULT_PHONE_REGION: ${FRONTPORCH_DEFAULT_PHONE_REGION:-US}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      TZ: ${TZ:-America/New_York}
    ports:
      - ${FRONTPORCH_WEB_BIND_IP:?set FRONTPORCH_WEB_BIND_IP}:${FRONTPORCH_WEB_PORT:-8000}:8000
    volumes:
      - ${ASTERISK_CONF_D_DIR:?set ASTERISK_CONF_D_DIR}:/etc/asterisk/conf.d
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-frontporch}
      POSTGRES_USER: ${POSTGRES_USER:-frontporch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      TZ: ${TZ:-America/New_York}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-frontporch} -d ${POSTGRES_DB:-frontporch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME:-frontporch-postgres}
