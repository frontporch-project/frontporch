; /etc/asterisk/pjsip.conf
[global]
type=global

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0
#tryinclude pjsip_network.conf

[endpoint-basic](!)
type=endpoint
context=default
disallow=all
allow=ulaw
transport=transport-udp
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[auth-userpass](!)
type=auth
auth_type=userpass

[aor-single-reg](!)
type=aor
max_contacts=1
remove_existing=yes

#tryinclude pjsip_voipms.conf
#include conf.d/pjsip_frontporch.conf
