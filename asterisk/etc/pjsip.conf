; /etc/asterisk/pjsip.conf
[global]
type=global

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

[endpoint-basic](!)
type=endpoint
context=default
disallow=all
allow=ulaw
transport=transport-udp

[auth-userpass](!)
type=auth
auth_type=userpass

[aor-single-reg](!)
type=aor
max_contacts=1
remove_existing=yes

#tryinclude pjsip_voipms.conf
#include conf.d/pjsip_frontporch.conf
