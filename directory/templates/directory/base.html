{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FrontPorch{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'directory/portal.css' %}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{% url 'directory:dashboard' %}">FrontPorch</a>
    <nav>
      {% if request.user.is_authenticated %}
        <form action="{% url 'logout' %}" method="post">
          {% csrf_token %}
          <button class="link-button" type="submit">Sign out</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">Sign in</a>
      {% endif %}
    </nav>
  </header>
  <main class="shell">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <p class="message {{ message.tags }}">{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
