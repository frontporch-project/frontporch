{% extends "directory/base.html" %}

{% block title %}Sign In - FrontPorch{% endblock %}

{% block content %}
<section class="form-panel">
  <h1>Sign In</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
      <div class="field">
        {{ field.label_tag }}
        {{ field }}
        {{ field.errors }}
      </div>
    {% endfor %}
    <div class="form-actions">
      <button class="button primary" type="submit">Sign In</button>
      <a class="button" href="{% url 'directory:register' %}">Create Account</a>
    </div>
  </form>
</section>
{% endblock %}
